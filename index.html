<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Groundwork — a childhood record</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300&display=swap" rel="stylesheet">
<style>
:root{
  --limestone:#EDE7DC;
  --limestone-deep:#DCD3C3;
  --limestone-line:#C7BCA8;
  --corten:#9C4A28;
  --corten-deep:#5E3220;
  --ink:#282320;
  --slate:#6E6558;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--limestone);color:var(--ink);
  font-family:"Newsreader",Georgia,serif;font-weight:300;
  font-size:17px;line-height:1.6;-webkit-font-smoothing:antialiased;
}
.label{
  font-family:"Barlow Condensed","Helvetica Neue",sans-serif;
  text-transform:uppercase;letter-spacing:.14em;font-weight:500;
  font-size:12px;color:var(--slate);
}
.shell{display:flex;min-height:100vh;align-items:stretch}

/* ---------- the wall (nav) ---------- */
.wall{
  width:206px;flex:0 0 206px;background:var(--limestone-deep);
  border-right:1px solid var(--limestone-line);
  display:flex;flex-direction:column-reverse;justify-content:flex-start;
  position:sticky;top:0;height:100vh;padding:0;overflow-y:auto;
}
.wall-head{padding:20px 18px 16px;border-bottom:1px solid var(--limestone-line);order:99}
.wall-head h1{
  font-family:"Barlow Condensed",sans-serif;font-weight:600;font-size:27px;
  line-height:1;letter-spacing:.02em;margin:0 0 6px;
  text-transform:uppercase;color:var(--corten-deep);
}
.wall-head p{margin:0;font-size:13px;color:var(--slate);line-height:1.4}
.course{
  appearance:none;border:0;width:100%;text-align:left;cursor:pointer;background:transparent;
  border-top:1px solid var(--limestone-line);padding:11px 16px 11px 18px;min-height:56px;
  display:flex;flex-direction:column;justify-content:center;gap:2px;position:relative;
  transition:background .18s ease;font-family:"Barlow Condensed",sans-serif;
}
.course:hover{background:#D3C9B7}
.course:focus-visible{outline:2px solid var(--corten);outline-offset:-3px}
.course .age{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--slate)}
.course .nm{font-size:17px;font-weight:500;letter-spacing:.03em;color:var(--ink);text-transform:uppercase;line-height:1.15}
.course[aria-current="true"]{background:var(--limestone)}
.course[aria-current="true"] .nm{color:var(--corten-deep)}
.course .fill{position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--limestone-line)}
.course .fill i{position:absolute;left:0;bottom:0;width:100%;height:0%;background:var(--corten);transition:height .4s ease}

/* ---------- work ---------- */
.work{flex:1;min-width:0;padding:44px 46px 130px;max-width:810px}
.era-eyebrow{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:4px}
.era-eyebrow .rule{flex:1;height:1px;background:var(--limestone-line);min-width:30px}
h2.era-title{
  font-family:"Barlow Condensed",sans-serif;font-weight:600;font-size:44px;
  line-height:1.02;letter-spacing:.01em;margin:0 0 10px;
  text-transform:uppercase;color:var(--corten-deep);
}
.era-intro{margin:0 0 34px;max-width:60ch;color:var(--slate);font-size:16.5px}
.era-intro em{font-style:italic;color:var(--ink)}

fieldset{border:0;padding:0;margin:0 0 34px}
.block-head{display:flex;align-items:center;gap:10px;margin:0 0 6px;border-bottom:1px solid var(--limestone-line);padding-bottom:7px}
.block-head .n{font-family:"Barlow Condensed",sans-serif;font-size:12px;letter-spacing:.14em;color:var(--corten);font-weight:600}
.block-note{margin:0 0 16px;font-size:15px;color:var(--slate);font-style:italic}

label.fld{display:block;margin:0 0 18px}
label.fld > span{display:block;margin-bottom:5px}
textarea,input[type=text]{
  width:100%;background:#F6F2EA;border:1px solid var(--limestone-line);
  border-left:3px solid var(--limestone-line);border-radius:0;padding:10px 12px;
  font-family:"Newsreader",Georgia,serif;font-size:16.5px;font-weight:300;
  color:var(--ink);line-height:1.55;resize:vertical;
  transition:border-color .15s ease,background .15s ease;
}
textarea:focus,input[type=text]:focus{outline:none;background:#FFFCF6;border-left-color:var(--corten)}
textarea{min-height:88px}

.jog{background:#E5DDCF;border-left:3px solid var(--corten);padding:14px 16px;margin:0 0 26px}
.jog p{margin:0 0 9px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{
  font-family:"Barlow Condensed",sans-serif;font-size:13.5px;letter-spacing:.03em;
  background:transparent;border:1px solid var(--limestone-line);padding:3px 9px;color:var(--slate);
}

.entry{border:1px solid var(--limestone-line);border-top:3px solid var(--corten);background:#F6F2EA;padding:16px 16px 2px;margin:0 0 14px;position:relative}
.entry .row{display:flex;gap:12px;flex-wrap:wrap}
.entry .row > *{flex:1;min-width:150px}
.del{position:absolute;top:8px;right:8px;background:none;border:0;cursor:pointer;font-family:"Barlow Condensed",sans-serif;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--slate);padding:4px 6px}
.del:hover{color:var(--corten)}
.add{font-family:"Barlow Condensed",sans-serif;text-transform:uppercase;letter-spacing:.12em;font-size:13px;font-weight:500;background:transparent;border:1px dashed var(--limestone-line);color:var(--corten);padding:9px 16px;cursor:pointer;width:100%}
.add:hover{border-color:var(--corten);background:#E5DDCF}
.empty{color:var(--slate);font-style:italic;margin:0 0 14px;font-size:15.5px}

.bar{position:fixed;left:206px;right:0;bottom:0;background:var(--limestone-deep);border-top:1px solid var(--limestone-line);padding:10px 46px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;z-index:5}
.bar .status{flex:1;min-width:110px}
.btn{font-family:"Barlow Condensed",sans-serif;text-transform:uppercase;letter-spacing:.12em;font-size:13px;font-weight:500;padding:8px 15px;cursor:pointer;background:var(--corten);color:#F6F2EA;border:1px solid var(--corten)}
.btn:hover{background:var(--corten-deep);border-color:var(--corten-deep)}
.btn.ghost{background:transparent;color:var(--corten-deep);border-color:var(--limestone-line)}
.btn.ghost:hover{background:#D3C9B7}
.nav-ends{display:flex;gap:10px;margin-top:40px;border-top:1px solid var(--limestone-line);padding-top:18px}

.notice{border:1px solid var(--limestone-line);border-left:3px solid var(--corten);background:#E5DDCF;padding:12px 16px;margin:0 0 28px;font-size:15.5px}

@media (max-width:860px){
  .shell{flex-direction:column}
  .wall{width:100%;flex:none;height:auto;position:static;flex-direction:row;overflow-x:auto;border-right:0;border-bottom:1px solid var(--limestone-line)}
  .wall-head{display:none}
  .course{min-width:136px;border-top:0;border-left:1px solid var(--limestone-line);padding:10px 14px}
  .course .fill{left:0;right:0;top:auto;bottom:0;width:auto;height:3px}
  .course .fill i{bottom:0;left:0;height:100%;width:0%;transition:width .4s ease}
  .work{padding:24px 20px 160px}
  h2.era-title{font-size:34px}
  .bar{left:0;padding:10px 20px}
  .mobile-head{display:block}
}
.mobile-head{display:none;padding:20px 20px 0}
.mobile-head h1{font-family:"Barlow Condensed",sans-serif;font-weight:600;font-size:26px;text-transform:uppercase;margin:0;color:var(--corten-deep);letter-spacing:.02em}

@media (prefers-reduced-motion:reduce){*{transition:none!important}}
@media print{
  .wall,.bar,.add,.del,.nav-ends,.mobile-head,.jog,.notice{display:none!important}
  .work{max-width:none;padding:0}
  body{font-size:12pt}
  textarea,input{border:0;border-bottom:1px solid #ccc;background:none}
}
</style>
</head>
<body>

<div class="mobile-head"><h1>Groundwork</h1></div>

<div class="shell">
  <nav class="wall" id="wall" aria-label="Sections">
    <div class="wall-head">
      <h1>Groundwork</h1>
      <p>A childhood, laid course by course. Start anywhere.</p>
    </div>
  </nav>
  <main class="work" id="work"></main>
</div>

<div class="bar">
  <span class="status label" id="status">Ready</span>
  <button class="btn ghost" id="exportBtn">Export as text</button>
  <button class="btn ghost" id="printBtn">Print</button>
</div>

<script>
/* ============================================================
   Groundwork — a childhood record.
   Everything you type is saved in THIS browser, on THIS device,
   using localStorage. Nothing is sent anywhere. It is private
   to you and to whoever else uses this same browser profile.

   Because it's local only:
     • it won't appear on your other devices
     • clearing browser data will erase it
   So use "Export as text" now and then to keep a copy safe.
   ============================================================ */

const KEY = 'groundwork:v1';

const store = {
  load(){
    try{ const raw = localStorage.getItem(KEY); return raw ? JSON.parse(raw) : null; }
    catch(e){ return null; }
  },
  save(o){
    try{ localStorage.setItem(KEY, JSON.stringify(o)); return true; }
    catch(e){ return false; }
  }
};

    note:'Repetition is what childhood is mostly made of, and it\'s the first thing people forget to write down.',
    fields:[
      {k:'name', t:'What it was', type:'text', ph:'e.g. Sunday lunch at Nan\'s'},
      {k:'when', t:'How often, and which years', type:'text', ph:'e.g. every Sunday, ages 5–13'},
      {k:'detail', t:'How it went', type:'area', ph:'Who was there, the order of things, what was said, what you did while the adults talked', rows:3},
      {k:'felt', t:'Whether you looked forward to it', type:'area', ph:'And what it gave you — or what it was really about', rows:2}
    ]
  },
  people:{
    title:'People — who you spent time with',
    add:'Add a person',
    empty:'No one added yet. Friends, teachers, coaches, neighbours, anyone outside the family who mattered.',
    fields:[
      {k:'name', t:'Name', type:'text', ph:''},
      {k:'who', t:'Who they were to you', type:'text', ph:'e.g. best mate, lived two doors down'},
      {k:'what', t:'What time with them was like, and what you got from it', type:'area', ph:'', rows:3}
    ]
  },
  moments:{
    title:'Moments — things that happened',
    add:'Add a moment',
    empty:'Nothing added yet. Good, bad, or just vivid — vividness is usually the signal that it mattered.',
    fields:[
      {k:'age', t:'Age', type:'text', ph:'e.g. 9'},
      {k:'title', t:'What happened', type:'text', ph:'Short — like a headline'},
      {k:'detail', t:'The detail you still remember', type:'area', ph:'Where you were, who was there, what was said', rows:3},
      {k:'felt', t:'How it felt then, and what you make of it now', type:'area', ph:'', rows:3}
    ]
  }
};

/* ============================================================
   STATE
   ============================================================ */
let data = {};
let current = 0;
let saveTimer = null;

const esc = s => String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const path = (era,k) => data[era]?.[k] ?? '';
const setStatus = t => document.getElementById('status').textContent = t;
const stamp = () => new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

function queueSave(){
  setStatus('Saving…');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    data.updatedAt = Date.now();
    const ok = store.save(data);
    setStatus(ok ? 'Saved on this device ' + stamp()
                 : 'Not saved — your browser may be blocking storage. Export a copy.');
    renderWall();
  }, 600);
}

function progress(era){
  const e = ERAS.find(x=>x.id===era);
  let total = e.fields.length, done = 0;
  e.fields.forEach(f=>{ if(String(path(era,f.k)).trim()) done++; });
  if(e.fam){ e.fam.fields.forEach(f=>{ total++; if(String(path(era,f.k)).trim()) done++; }); }
  (e.lists||[]).forEach(l=>{ total++; if((data[era]?.[l]||[]).length) done++; });
  return total ? done/total : 0;
}

/* ============================================================
   RENDER
   ============================================================ */
function renderWall(){
  const wall = document.getElementById('wall');
  wall.querySelectorAll('.course').forEach(n=>n.remove());
  const narrow = window.innerWidth<=860;
  ERAS.forEach((e,i)=>{
    const b = document.createElement('button');
    b.className='course';
    b.setAttribute('aria-current', i===current?'true':'false');
    const pct = Math.round(progress(e.id)*100);
    b.innerHTML = `<span class="fill"><i style="${narrow?'width':'height'}:${pct}%"></i></span>
      <span class="age">${esc(e.age)}</span><span class="nm">${esc(e.name)}</span>`;
    b.onclick = ()=>{ current=i; render(); window.scrollTo({top:0,behavior:'smooth'}); };
    wall.appendChild(b);
  });
}

function render(){
  const e = ERAS[current];
  const w = document.getElementById('work');
  let h = `<div class="era-eyebrow"><span class="label">Course ${current+1} of ${ERAS.length}</span><span class="rule"></span><span class="label">${esc(e.age)}</span></div>
    <h2 class="era-title">${esc(e.name)}</h2>
    <p class="era-intro">${e.intro}</p>`;

  if(current===0){
    h += `<div class="notice"><strong>Your writing is saved in this browser only.</strong> It stays private to this device and isn\'t sent anywhere. It won\'t appear on your other devices, and clearing your browser data will erase it — so use <em>Export as text</em> now and then to keep a copy.</div>`;
  }

  if(e.jog?.length){
    h += `<div class="jog"><p class="label" style="color:var(--corten-deep)">To jog it loose</p>
      <div class="chips">${e.jog.map(j=>`<span class="chip">${esc(j)}</span>`).join('')}</div></div>`;
  }

  let bn = 0;
  const num = () => String(++bn).padStart(2,'0');

  h += `<fieldset><div class="block-head"><span class="n">${num()}</span><span class="label">The record</span></div>`;
  e.fields.forEach(f=>{
    h += `<label class="fld"><span class="label"${f.reflect?' style="color:var(--corten)"':''}>${esc(f.t)}</span>
      <textarea rows="${f.rows||3}" placeholder="${esc(f.ph)}" data-f="${f.k}">${esc(path(e.id,f.k))}</textarea></label>`;
  });
  h += `</fieldset>`;

  if(e.fam){
    h += `<fieldset><div class="block-head"><span class="n">${num()}</span><span class="label" style="color:var(--corten-deep)">Family at this age</span></div>`;
    if(e.fam.note) h += `<p class="block-note">${esc(e.fam.note)}</p>`;
    e.fam.fields.forEach(f=>{
      h += `<label class="fld"><span class="label">${esc(f.t)}</span>
        <textarea rows="${f.rows||4}" placeholder="${esc(f.ph)}" data-f="${f.k}">${esc(path(e.id,f.k))}</textarea></label>`;
    });
    h += `</fieldset>`;
  }

  (e.lists||[]).forEach(lk=>{
    const def = LIST_DEFS[lk];
    const items = data[e.id]?.[lk] || [];
    h += `<fieldset><div class="block-head"><span class="n">${num()}</span><span class="label">${esc(def.title)}</span></div>`;
    if(def.note) h += `<p class="block-note">${esc(def.note)}</p>`;
    if(!items.length) h += `<p class="empty">${esc(def.empty)}</p>`;
    items.forEach((it,i)=>{
      h += `<div class="entry"><button class="del" data-del="${lk}" data-i="${i}">Remove</button>`;
      const inline = def.fields.filter(f=>f.type==='text');
      const blocks = def.fields.filter(f=>f.type!=='text');
      if(inline.length){
        h += `<div class="row">` + inline.map(f=>
          `<label class="fld"><span class="label">${esc(f.t)}</span>
           <input type="text" placeholder="${esc(f.ph||'')}" data-l="${lk}" data-i="${i}" data-f="${f.k}" value="${esc(it[f.k]||'')}"></label>`).join('') + `</div>`;
      }
      blocks.forEach(f=>{
        h += `<label class="fld"><span class="label">${esc(f.t)}</span>
          <textarea rows="${f.rows||3}" placeholder="${esc(f.ph||'')}" data-l="${lk}" data-i="${i}" data-f="${f.k}">${esc(it[f.k]||'')}</textarea></label>`;
      });
      h += `</div>`;
    });
    h += `<button class="add" data-add="${lk}">${esc(def.add)}</button></fieldset>`;
  });

  h += `<div class="nav-ends">`;
  if(current>0) h += `<button class="btn ghost" data-go="${current-1}">← ${esc(ERAS[current-1].name)}</button>`;
  if(current<ERAS.length-1) h += `<button class="btn ghost" data-go="${current+1}">${esc(ERAS[current+1].name)} →</button>`;
  h += `</div>`;

  w.innerHTML = h;

  w.querySelectorAll('[data-f]').forEach(el=>{
    el.addEventListener('input', ev=>{
      const t = ev.target, era = ERAS[current].id;
      data[era] = data[era] || {};
      if(t.dataset.l) data[era][t.dataset.l][+t.dataset.i][t.dataset.f] = t.value;
      else data[era][t.dataset.f] = t.value;
      queueSave();
    });
  });
  w.querySelectorAll('[data-add]').forEach(b=>b.onclick=()=>{
    const era = ERAS[current].id, lk = b.dataset.add;
    data[era] = data[era]||{}; data[era][lk] = data[era][lk]||[];
    data[era][lk].push({}); queueSave(); render();
  });
  w.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{
    data[ERAS[current].id][b.dataset.del].splice(+b.dataset.i,1); queueSave(); render();
  });
  w.querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>{
    current = +b.dataset.go; render(); window.scrollTo({top:0,behavior:'smooth'});
  });

  renderWall();
}

/* ============================================================
   EXPORT
   ============================================================ */
function toText(){
  let out = 'GROUNDWORK — a childhood record\nExported ' + new Date().toLocaleDateString() + '\n';
  ERAS.forEach(e=>{
    let body = '';
    e.fields.forEach(f=>{
      const v = String(path(e.id,f.k)).trim();
      if(v) body += `### ${f.t}\n${v}\n\n`;
    });
    if(e.fam){
      let fbody = '';
      e.fam.fields.forEach(f=>{
        const v = String(path(e.id,f.k)).trim();
        if(v) fbody += `### ${f.t}\n${v}\n\n`;
      });
      if(fbody) body += `\n**Family at this age**\n\n` + fbody;
    }
    (e.lists||[]).forEach(lk=>{
      const items = (data[e.id]?.[lk]||[]).filter(it=>Object.values(it).some(v=>String(v).trim()));
      if(items.length){
        body += `### ${LIST_DEFS[lk].title}\n`;
        items.forEach(it=>{
          LIST_DEFS[lk].fields.forEach(f=>{
            const v = String(it[f.k]||'').trim();
            if(v) body += `- **${f.t}:** ${v}\n`;
          });
          body += '\n';
        });
      }
    });
    if(body) out += `\n\n## ${e.name} (${e.age})\n\n` + body;
  });
  return out;
}
document.getElementById('exportBtn').onclick = ()=>{
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([toText()],{type:'text/markdown'}));
  a.download = 'childhood-record.md'; a.click();
  URL.revokeObjectURL(a.href); setStatus('Exported');
};
document.getElementById('printBtn').onclick = ()=>window.print();
window.addEventListener('resize', renderWall);

/* ============================================================
   BOOT
   ============================================================ */
data = store.load() || {};
render();
setStatus(Object.keys(data).length ? 'Loaded your last version' : 'New record — nothing saved yet');
</script>
</body>
</html>
